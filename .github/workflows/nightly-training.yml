name: Nightly Training

on:
  schedule:
    # Run at midnight UTC every night
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      skip_calm:
        description: 'Skip CALM training'
        required: false
        default: 'false'
        type: boolean
      skip_unicon:
        description: 'Skip UniCon training'
        required: false
        default: 'false'
        type: boolean
      force:
        description: 'Run even if no relevant changes detected'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      calm_changed: ${{ steps.diff.outputs.calm_changed }}
      unicon_changed: ${{ steps.diff.outputs.unicon_changed }}
      any_changed: ${{ steps.diff.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes since last successful training
        id: diff
        run: |
          STAMP_DIR="${HOME}/.nightly_training_stamps"
          mkdir -p "$STAMP_DIR"
          CALM_STAMP="$STAMP_DIR/calm_last_commit"
          UNICON_STAMP="$STAMP_DIR/unicon_last_commit"

          CALM_PATHS='tools/calm_training tools/ml data/calm training'
          UNICON_PATHS='tools/unicon_training tools/ml assets/motions'

          calm_changed=false
          unicon_changed=false

          # Check for input changes since last successful training.
          # No stamp file means training has never succeeded — must run at least once.
          # Stamp file records the commit of last successful training so we diff from there.
          if [ -f "$CALM_STAMP" ]; then
            CALM_SINCE=$(cat "$CALM_STAMP")
            if git rev-parse --verify "$CALM_SINCE" >/dev/null 2>&1; then
              if git diff --name-only "$CALM_SINCE"..HEAD -- $CALM_PATHS | grep -q .; then
                echo "CALM inputs changed since last successful training ($CALM_SINCE)"
                calm_changed=true
              fi
            else
              echo "CALM stamp commit $CALM_SINCE not found — treating as changed"
              calm_changed=true
            fi
          else
            echo "No CALM training stamp found — need initial training"
            calm_changed=true
          fi

          if [ -f "$UNICON_STAMP" ]; then
            UNICON_SINCE=$(cat "$UNICON_STAMP")
            if git rev-parse --verify "$UNICON_SINCE" >/dev/null 2>&1; then
              if git diff --name-only "$UNICON_SINCE"..HEAD -- $UNICON_PATHS | grep -q .; then
                echo "UniCon inputs changed since last successful training ($UNICON_SINCE)"
                unicon_changed=true
              fi
            else
              echo "UniCon stamp commit $UNICON_SINCE not found — treating as changed"
              unicon_changed=true
            fi
          else
            echo "No UniCon training stamp found — need initial training"
            unicon_changed=true
          fi

          any_changed=false
          if [ "$calm_changed" = "true" ] || [ "$unicon_changed" = "true" ]; then
            any_changed=true
          fi

          echo "calm_changed=$calm_changed" >> "$GITHUB_OUTPUT"
          echo "unicon_changed=$unicon_changed" >> "$GITHUB_OUTPUT"
          echo "any_changed=$any_changed" >> "$GITHUB_OUTPUT"

          echo "CALM changed: $calm_changed"
          echo "UniCon changed: $unicon_changed"

  train:
    needs: check-changes
    if: >-
      needs.check-changes.outputs.any_changed == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')
    runs-on: self-hosted
    timeout-minutes: 720  # 12 hour safety limit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python environment
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install torch numpy mujoco

      - name: Train CALM
        if: >-
          (needs.check-changes.outputs.calm_changed == 'true'
          || (github.event_name == 'workflow_dispatch' && inputs.force == 'true'))
          && (github.event_name == 'schedule' || inputs.skip_calm != 'true')
        run: |
          source .venv/bin/activate
          ./scripts/train-calm-nightly.sh

      - name: Record CALM training stamp
        if: >-
          success()
          && (needs.check-changes.outputs.calm_changed == 'true'
          || (github.event_name == 'workflow_dispatch' && inputs.force == 'true'))
          && (github.event_name == 'schedule' || inputs.skip_calm != 'true')
        run: |
          mkdir -p "${HOME}/.nightly_training_stamps"
          git rev-parse HEAD > "${HOME}/.nightly_training_stamps/calm_last_commit"

      - name: Train UniCon
        if: >-
          (needs.check-changes.outputs.unicon_changed == 'true'
          || (github.event_name == 'workflow_dispatch' && inputs.force == 'true'))
          && (github.event_name == 'schedule' || inputs.skip_unicon != 'true')
        run: |
          source .venv/bin/activate
          ./scripts/train-unicon-nightly.sh

      - name: Record UniCon training stamp
        if: >-
          success()
          && (needs.check-changes.outputs.unicon_changed == 'true'
          || (github.event_name == 'workflow_dispatch' && inputs.force == 'true'))
          && (github.event_name == 'schedule' || inputs.skip_unicon != 'true')
        run: |
          mkdir -p "${HOME}/.nightly_training_stamps"
          git rev-parse HEAD > "${HOME}/.nightly_training_stamps/unicon_last_commit"

      - name: Upload CALM checkpoints
        if: >-
          always()
          && (needs.check-changes.outputs.calm_changed == 'true'
          || (github.event_name == 'workflow_dispatch' && inputs.force == 'true'))
          && (github.event_name == 'schedule' || inputs.skip_calm != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: calm-checkpoints-${{ github.run_number }}
          path: checkpoints/calm/
          retention-days: 30

      - name: Upload UniCon checkpoints
        if: >-
          always()
          && (needs.check-changes.outputs.unicon_changed == 'true'
          || (github.event_name == 'workflow_dispatch' && inputs.force == 'true'))
          && (github.event_name == 'schedule' || inputs.skip_unicon != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: unicon-checkpoints-${{ github.run_number }}
          path: generated/unicon/
          retention-days: 30

  skip-notification:
    needs: check-changes
    if: >-
      needs.check-changes.outputs.any_changed == 'false'
      && (github.event_name == 'schedule' || inputs.force != 'true')
    runs-on: self-hosted
    steps:
      - name: No training needed
        run: echo "No changes since last successful training and all artifacts present — skipping training."
